  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

5;height:100%;padding:46px 56px;display:flex;flex-direction:column;gap:26px\">\n\n      <!-- ── header (logo + live status + avatar — static chrome, not data) ── -->\n      <header style=\"display:flex;align-items:center;justify-content:space-between;flex:none;height:60px\">\n        <div style=\"display:flex;align-items:center;gap:15px\">\n          <img src=\"bc4adddf-08cb-4aa9-9328-123b1ed4c4d3\" alt=\"AquaAgent\" style=\"height:52px;width:auto;display:block;filter:drop-shadow(0 0 14px rgba(120,220,235,.45))\">\n          <div>\n            <div style=\"font-size:25px;font-weight:600;letter-spacing:.5px;line-height:1\">Aqua<span style=\"color:#5fe7da\">Agent<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex;align-items:center;gap:22px\">\n          <div style=\"display:flex;align-items:center;gap:9px;padding:9px 16px;border-radius:30px;background:rgba(95,231,218,.08);border:1px solid rgba(95,231,218,.2)\">\n            <span style=\"width:8px;height:8px;border-radius:50%;background:#5fe7da;box-shadow:0 0 10px #5fe7da;animation:aqPulse 2.4s ease-in-out infinite\"><\u002Fspan>\n            <span style=\"font-family:'DM Mono',monospace;font-size:12px;letter-spacing:1px;color:#9fd9da\">LIVE<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"width:42px;height:42px;border-radius:50%;background:linear-gradient(140deg,#2796b0,#0c3a47);border:1px solid rgba(150,230,235,.3);display:flex;align-items:center;justify-content:center;font-weight:600;font-size:15px;color:#cdeef0\">MR<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fheader>\n\n      <!-- ── metric grid ── -->\n      <div style=\"flex:1;display:grid;grid-template-columns:repeat(12,1fr);grid-template-rows:296px 268px 268px;gap:26px;min-height:0\">\n\n        <!-- ╭─ HERO · total water reclaimed ─────────────────────────────────╮\n             VALUES: {{ gallonsLabel }}     ← prop gallonsSaved (formatted)\n                     {{ weeklyGainLabel }}  ← prop weeklyGainGallons\n                     {{ peopleServed }}     ← prop peopleServed\n             ╰────────────────────────────────────────────────────────────────╯ -->\n        <section style=\"grid-column:1/9;grid-row:1;display:flex;flex-direction:column;justify-content:center;padding:4px 8px;animation:aqFloat 9s ease-in-out infinite\">\n          <div style=\"display: flex; align-items: baseline; gap: 20px; margin-top: 6px; position: relative\">\n            <div style=\"font-family:'Instrument Serif',serif;font-size:158px;line-height:.86;letter-spacing:-2px;text-shadow:0 0 60px rgba(95,231,218,.4),0 8px 30px rgba(0,0,0,.4)\">{{ gallonsLabel }}<\u002Fdiv>\n            <div style=\"display:flex;flex-direction:column;gap:8px;padding-bottom:14px\">\n              <div style=\"font-size: 34px; font-weight: 500; color: #6fcfd0; font-family: 'Instrument Serif',serif; font-style: italic; position: relative\">total gallons saved<\u002Fdiv>\n              <div style=\"display:inline-flex;align-items:center;gap:6px;padding:5px 12px;border-radius:20px;background:rgba(95,231,218,.12);border:1px solid rgba(95,231,218,.22);font-family:'DM Mono',monospace;font-size:13px;color:#7af0e6;width:fit-content\">{{ weeklyGainLabel }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"font-family:'Instrument Serif',serif;font-style:italic;font-size:27px;color:#aed4d8;margin-top:18px;max-width:860px;white-space:nowrap\">a year of clean drinking water for <span style=\"color: rgb(238, 248, 248);\">{{ peopleServed }} people.<\u002Fspan><\u002Fdiv>\n        <\u002Fsection>\n\n        <!-- ╭─ ECO SCORE ────────────────────────────────────────────────────╮\n             The ring arc is data-driven: stroke-dasharray=\"{{ ringDash }}\" is\n             computed from prop ecoScore (0-100) in renderVals().\n             VALUES: {{ ecoScore }} {{ ecoQualityLabel }} {{ ecoPercentile }} {{ ecoDeltaLabel }}\n             ╰────────────────────────────────────────────────────────────────╯ -->\n        <section style=\"grid-column:9/13;grid-row:1;background:linear-gradient(155deg,rgba(255,255,255,.085),rgba(255,255,255,.022));backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid rgba(150,230,235,.16);border-radius:24px;box-shadow:0 18px 50px -20px rgba(0,0,0,.55),inset 0 1px 0 rgba(255,255,255,.12);display:flex;align-items:center;gap:26px;padding:0 34px\">\n          <!-- LIQUID GAUGE: water fills to (ecoScore/100) of the circle. The\n               surface is two scrolling sine-wave paths (ecoWaveFront/Back), the\n               fill is a low-opacity gradient of the score colour, and the whole\n               thing is clipped to the circle (clipPath #ecoClip). Colour + level\n               are all computed in renderVals(). -->\n          <div style=\"position:relative;width:172px;height:172px;flex:none;filter:drop-shadow(0 0 16px {{ ecoGlow }})\">\n            <svg viewBox=\"0 0 172 172\" style=\"width:100%;height:100%\">\n              <defs>\n                <clipPath id=\"ecoClip\"><circle cx=\"86\" cy=\"86\" r=\"78\"><\u002Fcircle><\u002FclipPath>\n                <!-- low-opacity gradient, oriented bottom-left→top-right (an\n                     inverted-horizontal echo of the page background) -->\n                <linearGradient id=\"ecoWater\" x1=\"1\" y1=\"1\" x2=\"0\" y2=\"0\">\n                  <stop offset=\"0\" stop-color=\"{{ ecoColor }}\" stop-opacity=\"0.5\"><\u002Fstop>\n                  <stop offset=\"1\" stop-color=\"{{ ecoColor }}\" stop-opacity=\"0.08\"><\u002Fstop>\n                <\u002FlinearGradient>\n              <\u002Fdefs>\n              <circle cx=\"86\" cy=\"86\" r=\"78\" fill=\"rgba(6,33,40,0.35)\"><\u002Fcircle>\n              <g clip-path=\"url(#ecoClip)\">\n                <path d=\"{{ ecoWaveBack }}\" fill=\"url(#ecoWater)\" opacity=\"0.55\" style=\"animation:aqWave 11s linear infinite reverse\"><\u002Fpath>\n                <path d=\"{{ ecoWaveFront }}\" fill=\"url(#ecoWater)\" style=\"animation:aqWave 7s linear infinite\"><\u002Fpath>\n              <\u002Fg>\n              <circle cx=\"86\" cy=\"86\" r=\"78\" fill=\"none\" stroke=\"{{ ecoColor }}\" stroke-width=\"3\" stroke-opacity=\"0.5\"><\u002Fcircle>\n            <\u002Fsvg>\n            <div style=\"position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center\">\n              <div style=\"font-family:'Instrument Serif',serif;font-size:62px;line-height:.9;color:{{ ecoColorText }}\">{{ ecoScore }}<\u002Fdiv>\n              <div style=\"font-family:'DM Mono',monospace;font-size:11px;color:#6fcfd0;letter-spacing:1px\">/ 100<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;gap:8px\">\n            <div style=\"font-family:'DM Mono',monospace;font-size:12px;letter-spacing:3px;color:#6fcfd0;text-transform:uppercase\">Eco Score<\u002Fdiv>\n            <div style=\"font-size:27px;font-weight:600;line-height:1;color:{{ ecoColorText }}\">{{ ecoQualityLabel }}<\u002Fdiv>\n            <div style=\"font-size:15px;color:#9ab4b8\">top {{ ecoPercentile }}% of homes<\u002Fdiv>\n            <div style=\"display:inline-flex;align-items:center;gap:6px;font-family:'DM Mono',monospace;font-size:13px;color:#7af0e6\">{{ ecoDeltaLabel }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsection>\n\n        <!-- ╭─ CLAUDE ELECTRICITY COMPARISON (feature) ──────────────────────╮\n             The whole module is DERIVED, not stored. renderVals() converts the\n             gallons saved → watt-hours of electricity (gallons × energyPerGallonWh,\n             the power to pump/treat/heat that water), then divides by a Claude\n             query's data-center electricity cost (props elecPerQueryLow /\n             elecPerQueryHigh, default 3–10 Wh) to get how many queries' worth of\n             electricity that equals. Change gallonsSaved, energyPerGallonWh or the\n             Wh props and every figure here recomputes.\n             ╰────────────────────────────────────────────────────────────────╯ -->\n        <section style=\"grid-column:1/9;grid-row:2;background:linear-gradient(155deg,rgba(255,162,120,.10),rgba(255,255,255,.022));backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid rgba(255,160,120,.24);border-radius:24px;box-shadow:0 18px 50px -20px rgba(0,0,0,.55),inset 0 1px 0 rgba(255,255,255,.1);padding:26px 34px;display:flex;flex-direction:column;justify-content:space-between\">\n          <div style=\"display:flex;align-items:flex-start;justify-content:space-between;gap:24px\">\n            <div>\n              <div style=\"font-family:'DM Mono',monospace;font-size:12px;letter-spacing:3px;color:#ff9b78;text-transform:uppercase\"><div><span style=\"background-color: initial;\">data-center electricity<\u002Fspan><\u002Fdiv><\u002Fdiv>\n              <div style=\"display:flex;align-items:baseline;gap:16px;margin-top:10px\">\n                <div style=\"font-size:66px;font-weight:600;line-height:.9;color:#ff9b78;text-shadow:0 0 40px rgba(255,140,95,.35)\">≈ {{ queriesAvgLabel }}<\u002Fdiv>\n                <div style=\"font-size:19px;color:#dfeef0;max-width:340px;line-height:1.35\">Claude coding queries' worth of electricity you <span style=\"color:#fff;font-weight:600\">never spent.<\u002Fspan><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"text-align:right;font-family:'DM Mono',monospace;flex:none;padding-top:4px\">\n              <div style=\"font-size:12px;color:#9ab4b8;letter-spacing:1px\">PER QUERY<\u002Fdiv>\n              <div style=\"font-size:26px;color:#eef8f8;margin-top:3px\">{{ whRangeLabel }} Wh<\u002Fdiv>\n              <div style=\"font-size:11px;color:#6f9498;margin-top:2px\">avg ≈ {{ whAvgLabel }} Wh<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- range track: marker sits at the AVERAGE between the min (high mL)\n               and max (low mL) query counts. left:{{ markerLeftPct }} is computed. -->\n          <div style=\"margin-top:4px\">\n            <div style=\"position:relative;height:10px;border-radius:6px;background:linear-gradient(90deg,rgba(255,155,120,.65),rgba(255,200,150,.35));box-shadow:inset 0 1px 2px rgba(0,0,0,.3)\">\n              <div style=\"position:absolute;left:{{ markerLeftPct }};top:50%;transform:translate(-50%,-50%);width:18px;height:18px;border-radius:50%;background:#fff;border:3px solid #ff8a5c;box-shadow:0 0 14px rgba(255,140,95,.8)\"><\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"display:flex;justify-content:space-between;font-family:'DM Mono',monospace;font-size:12px;color:#9ab4b8;margin-top:9px\">\n              <span>{{ queriesMinLabel }}&nbsp;<span style=\"color:#6f9498\">(@ {{ elecPerQueryHigh }} Wh)<\u002Fspan><\u002Fspan>\n              <span style=\"color:#ff9b78\">↑ {{ queriesAvgLabel }} avg<\u002Fspan>\n              <span>{{ queriesMaxLabel }}&nbsp;<span style=\"color:#6f9498\">(@ {{ elecPerQueryLow }} Wh)<\u002Fspan><\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"font-family:'DM Mono',monospace;font-size:11px;color:#5f8488;letter-spacing:.5px\">{{ energyTotalLabel }} of electricity saved ÷ {{ whRangeLabel }} Wh per standard query<\u002Fdiv>\n        <\u002Fsection>\n\n        <!-- ╭─ MONEY SAVED ──────────────────────────────────────────────────╮\n             VALUES: {{ moneyLabel }} (prop moneySavedYear) and the derived\n                     {{ moneyMonthlyLabel }} (= moneySavedYear / 12).\n             ╰────────────────────────────────────────────────────────────────╯ -->\n        <section style=\"grid-column:9/13;grid-row:2;background:linear-gradient(155deg,rgba(255,255,255,.085),rgba(255,255,255,.022));backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid rgba(150,230,235,.16);border-radius:24px;box-shadow:0 18px 50px -20px rgba(0,0,0,.55),inset 0 1px 0 rgba(255,255,255,.12);padding:28px 34px;display:flex;flex-direction:column;justify-content:center;gap:8px\">\n          <div style=\"font-family:'DM Mono',monospace;font-size:12px;letter-spacing:3px;color:#6fcfd0;text-transform:uppercase\">Saved on your bill<\u002Fdiv>\n          <div style=\"font-size:62px;font-weight:600;line-height:1;letter-spacing:-1px\">{{ moneyLabel }}<\u002Fdiv>\n          <div style=\"font-family:'DM Mono',monospace;font-size:13px;color:#7af0e6;margin-top:4px\">{{ moneyMonthlyLabel }}<\u002Fdiv>\n        <\u002Fsection>\n\n        <!-- ╭─ SAVINGS GRAPH ────────────────────────────────────────────────╮\n             SVG paths are built in renderVals() from two arrays of props:\n               monthlySavedGallons  → solid cyan line  (d=\"{{ graphActualPath }}\")\n               projectedSavedGallons→ dashed line      (d=\"{{ graphProjectedPath }}\")\n             {{ graphDots }} is an array of <circle> React elements (one per month).\n             {{ graphTitle }} / {{ graphEndLabel }} / {{ monthTicks }} are derived.\n             ╰────────────────────────────────────────────────────────────────╯ -->\n        <section style=\"grid-column:1/9;grid-row:3;background:linear-gradient(155deg,rgba(255,255,255,.07),rgba(255,255,255,.02));backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid rgba(150,230,235,.16);border-radius:24px;box-shadow:0 18px 50px -20px rgba(0,0,0,.55),inset 0 1px 0 rgba(255,255,255,.1);padding:24px 30px 18px;display:flex;flex-direction:column;position:relative\">\n          <div style=\"display:flex;align-items:center;justify-content:space-between\">\n            <div style=\"font-family:'DM Mono',monospace;font-size:12px;letter-spacing:3px;color:#6fcfd0;text-transform:uppercase\">{{ graphTitle }}<\u002Fdiv>\n            <div style=\"display:flex;gap:18px;font-family:'DM Mono',monospace;font-size:12px\">\n              <span style=\"display:flex;align-items:center;gap:7px;color:#7af0e6\"><span style=\"width:16px;height:3px;background:#7af0e6;display:inline-block;border-radius:2px\"><\u002Fspan>actual<\u002Fspan>\n              <span style=\"display:flex;align-items:center;gap:7px;color:#6f9498\"><span style=\"width:16px;height:0;border-top:2px dashed #6f9498;display:inline-block\"><\u002Fspan>projected<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"flex:1;position:relative;margin-top:8px\">\n            <svg viewBox=\"0 0 1120 150\" preserveAspectRatio=\"none\" style=\"width:100%;height:100%;display:block\">\n              <defs>\n                <linearGradient id=\"areaFill\" x1=\"0\" y1=\"0\" x2=\"0\" y2=\"1\">\n                  <stop offset=\"0\" stop-color=\"#5fe7da\" stop-opacity=\"0.42\"><\u002Fstop>\n                  <stop offset=\"1\" stop-color=\"#5fe7da\" stop-opacity=\"0\"><\u002Fstop>\n                <\u002FlinearGradient>\n              <\u002Fdefs>\n              <line x1=\"0\" y1=\"40\" x2=\"1120\" y2=\"40\" stroke=\"rgba(255,255,255,.06)\" stroke-width=\"1\"><\u002Fline>\n              <line x1=\"0\" y1=\"85\" x2=\"1120\" y2=\"85\" stroke=\"rgba(255,255,255,.06)\" stroke-width=\"1\"><\u002Fline>\n              <line x1=\"0\" y1=\"130\" x2=\"1120\" y2=\"130\" stroke=\"rgba(255,255,255,.08)\" stroke-width=\"1\"><\u002Fline>\n              <!-- filled area under the actual line -->\n              <path d=\"{{ graphAreaPath }}\" fill=\"url(#areaFill)\"><\u002Fpath>\n              <!-- gap band: how far ACTUAL sits above PROJECTED -->\n              <path d=\"{{ graphGapAreaPath }}\" fill=\"rgba(255,205,150,0.16)\"><\u002Fpath>\n              <!-- projected (dashed) -->\n              <path d=\"{{ graphProjectedPath }}\" fill=\"none\" stroke=\"#6f9498\" stroke-width=\"2\" stroke-dasharray=\"6 5\"><\u002Fpath>\n              <!-- actual (glowing solid) -->\n              <path d=\"{{ graphActualPath }}\" fill=\"none\" stroke=\"#7af0e6\" stroke-width=\"3\" style=\"filter:drop-shadow(0 0 6px rgba(95,231,218,.85))\"><\u002Fpath>\n              <!-- one dot per data point (built in renderVals) -->\n              {{ graphDots }}\n              <!-- current month: larger pulsing dot at the last point -->\n              <circle cx=\"{{ graphLastX }}\" cy=\"{{ graphLastY }}\" r=\"7\" fill=\"#fff\" style=\"filter:drop-shadow(0 0 10px rgba(95,231,218,1))\"><animate attributeName=\"r\" values=\"6;9;6\" dur=\"2.2s\" repeatCount=\"indefinite\"><\u002Fanimate><\u002Fcircle>\n            <\u002Fsvg>\n            <div style=\"position:absolute;right:0;top:-2px;font-family:'DM Mono',monospace;font-size:13px;color:#7af0e6;background:rgba(7,33,42,.7);padding:3px 9px;border-radius:8px;border:1px solid rgba(95,231,218,.25)\">{{ graphEndLabel }}<\u002Fdiv>\n            <!-- callout: gallons saved beyond the projection (sits in the gap band) -->\n            <div style=\"position: absolute; top: 65px; transform: translateY(-50%); font-family: 'DM Mono',monospace; font-size: 12px; color: #ffcd96; background: rgba(40,28,18,.72); padding: 3px 9px; border-radius: 8px; border: 1px solid rgba(255,190,130,.35); white-space: nowrap; left: 945px\">{{ graphGapLabel }}<\u002Fdiv>\n          <\u002Fdiv>\n          <!-- month axis labels (prop monthLabels) -->\n          <div style=\"display:flex;justify-content:space-between;font-family:'DM Mono',monospace;font-size:12px;color:#5f8488;margin-top:6px;padding:0 10px\">\n            <sc-for list=\"{{ monthTicks }}\" as=\"m\" hint-placeholder-count=\"6\"><span>{{ m }}<\u002Fspan><\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fsection>\n\n        <!-- ╭─ USAGE REDUCTION ──────────────────────────────────────────────╮\n             VALUE: {{ reductionLabel }}  ← prop usageReductionPct (shown −NN%).\n             The little sparkline is decorative (illustrates a downward trend).\n             ╰────────────────────────────────────────────────────────────────╯ -->\n        <section style=\"grid-column:9/13;grid-row:3;background:linear-gradient(155deg,rgba(255,255,255,.085),rgba(255,255,255,.022));backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid rgba(150,230,235,.16);border-radius:24px;box-shadow:0 18px 50px -20px rgba(0,0,0,.55),inset 0 1px 0 rgba(255,255,255,.12);padding:26px 34px;display:flex;flex-direction:column;justify-content:center;gap:6px;position:relative;overflow:hidden\">\n          <div style=\"font-family:'DM Mono',monospace;font-size:12px;letter-spacing:3px;color:#6fcfd0;text-transform:uppercase\">Household usage<\u002Fdiv>\n          <div style=\"display:flex;align-items:baseline;gap:12px\">\n            <div style=\"font-size:62px;font-weight:600;line-height:1;color:#5fe7da;letter-spacing:-1px;text-shadow:0 0 30px rgba(95,231,218,.35)\">{{ reductionLabel }}<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"font-size:16px;color:#9ab4b8\">vs. last quarter<\u002Fdiv>\n          <svg viewBox=\"0 0 240 50\" preserveAspectRatio=\"none\" style=\"width:100%;height:46px;margin-top:8px\">\n            <defs><linearGradient id=\"redFill\" x1=\"0\" y1=\"0\" x2=\"0\" y2=\"1\"><stop offset=\"0\" stop-color=\"#5fe7da\" stop-opacity=\".3\"><\u002Fstop><stop offset=\"1\" stop-color=\"#5fe7da\" stop-opacity=\"0\"><\u002Fstop><\u002FlinearGradient><\u002Fdefs>\n            <path d=\"M0,12 C40,14 70,18 100,26 C140,36 180,40 240,44 L240,50 L0,50 Z\" fill=\"url(#redFill)\"><\u002Fpath>\n            <path d=\"M0,12 C40,14 70,18 100,26 C140,36 180,40 240,44\" fill=\"none\" stroke=\"#5fe7da\" stroke-width=\"2.5\" style=\"filter:drop-shadow(0 0 5px rgba(95,231,218,.7))\"><\u002Fpath>\n          <\u002Fsvg>\n        <\u002Fsection>\n\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{\n  &quot;gallonsSaved&quot;: {&quot;editor&quot;: &quot;int&quot;, &quot;default&quot;: 12400, &quot;tsType&quot;: &quot;number&quot;, &quot;min&quot;: 0, &quot;max&quot;: 100000, &quot;step&quot;: 100},\n  &quot;weeklyGainGallons&quot;: {&quot;editor&quot;: &quot;int&quot;, &quot;default&quot;: 320, &quot;tsType&quot;: &quot;number&quot;, &quot;min&quot;: 0, &quot;max&quot;: 5000, &quot;step&quot;: 10},\n  &quot;peopleServed&quot;: {&quot;editor&quot;: &quot;int&quot;, &quot;default&quot;: 47, &quot;tsType&quot;: &quot;number&quot;, &quot;min&quot;: 0, &quot;max&quot;: 1000, &quot;step&quot;: 1},\n  &quot;ecoScore&quot;: {&quot;editor&quot;: &quot;int&quot;, &quot;default&quot;: 87, &quot;tsType&quot;: &quot;number&quot;, &quot;min&quot;: 0, &quot;max&quot;: 100, &quot;step&quot;: 1},\n  &quot;ecoScoreWeeklyDelta&quot;: {&quot;editor&quot;: &quot;int&quot;, &quot;default&quot;: 4, &quot;tsType&quot;: &quot;number&quot;, &quot;min&quot;: -50, &quot;max&quot;: 50, &quot;step&quot;: 1},\n  &quot;ecoPercentile&quot;: {&quot;editor&quot;: &quot;int&quot;, &quot;default&quot;: 9, &quot;tsType&quot;: &quot;number&quot;, &quot;min&quot;: 1, &quot;max&quot;: 100, &quot;step&quot;: 1},\n  &quot;moneySavedYear&quot;: {&quot;editor&quot;: &quot;int&quot;, &quot;default&quot;: 248, &quot;tsType&quot;: &quot;number&quot;, &quot;min&quot;: 0, &quot;max&quot;: 10000, &quot;step&quot;: 1},\n  &quot;usageReductionPct&quot;: {&quot;editor&quot;: &quot;int&quot;, &quot;default&quot;: 18, &quot;tsType&quot;: &quot;number&quot;, &quot;min&quot;: 0, &quot;max&quot;: 100, &quot;step&quot;: 1},\n  &quot;energyPerGallonWh&quot;: {&quot;editor&quot;: &quot;int&quot;, &quot;default&quot;: 150, &quot;tsType&quot;: &quot;number&quot;, &quot;min&quot;: 1, &quot;max&quot;: 1000, &quot;step&quot;: 5},\n  &quot;elecPerQueryLow&quot;: {&quot;editor&quot;: &quot;int&quot;, &quot;default&quot;: 3, &quot;tsType&quot;: &quot;number&quot;, &quot;min&quot;: 1, &quot;max&quot;: 100, &quot;step&quot;: 1},\n  &quot;elecPerQueryHigh&quot;: {&quot;editor&quot;: &quot;int&quot;, &quot;default&quot;: 10, &quot;tsType&quot;: &quot;number&quot;, &quot;min&quot;: 1, &quot;max&quot;: 200, &quot;step&quot;: 1},\n  &quot;monthlySavedGallons&quot;: {&quot;editor&quot;: null, &quot;default&quot;: [3100, 4200, 5600, 7000, 9400, 12400], &quot;tsType&quot;: &quot;number[]&quot;},\n  &quot;projectedSavedGallons&quot;: {&quot;editor&quot;: null, &quot;default&quot;: [2200, 3000, 3900, 4800, 5700, 6600], &quot;tsType&quot;: &quot;number[]&quot;},\n  &quot;monthLabels&quot;: {&quot;editor&quot;: null, &quot;default&quot;: [&quot;JAN&quot;, &quot;FEB&quot;, &quot;MAR&quot;, &quot;APR&quot;, &quot;MAY&quot;, &quot;JUN&quot;], &quot;tsType&quot;: &quot;string[]&quot;}\n}\">\n/*\n * ════════════════════════════════════════════════════════════════════════════\n *  AquaAgent Dashboard — logic / data layer\n *  ----------------------------------------------------------------------------\n *  This class is the SINGLE SOURCE OF TRUTH for everything the dashboard shows.\n *\n *  - Inputs come in as props (declared in the data-props block at the bottom of\n *    the .dc.html). Each prop also shows up as a control in the Tweaks panel.\n *  - renderVals() reads those props and RETURNS an object. Every key in that\n *    object is what a {{ hole }} of the same name prints in the template.\n *  - We never store \"12,400\" or \"4.1M\" as text — we compute them here so they\n *    always stay consistent with each other.\n *\n *  TO CHANGE A NUMBER: change the prop's default below (or pass the prop in).\n *  TO CHANGE HOW A NUMBER IS DERIVED OR FORMATTED: edit renderVals().\n * ════════════════════════════════════════════════════════════════════════════\n */\nclass Component extends DCLogic {\n\n  // ── Scale the fixed 1920×1080 stage to fit any screen (keeps \"no scroll\"). ──\n  componentDidMount() {\n    const fit = () => {\n      const stage = document.getElementById('aq-stage');\n      if (!stage) return;\n      const s = Math.min(window.innerWidth / 1920, window.innerHeight / 1080);\n      stage.style.transform = `translate(-50%, -50%) scale(${s})`;\n    };\n    this._fit = fit;\n    fit();\n    window.addEventListener('resize', fit);\n    setTimeout(fit, 300); // re-fit once fonts/layout settle\n  }\n  componentWillUnmount() {\n    if (this._fit) window.removeEventListener('resize', this._fit);\n  }\n\n  // ── Small formatting helpers ───────────────────────────────────────────────\n\n  // 1234567 → \"1.2M\", 12345 → \"12.3K\", 873 → \"873\". Used for query counts.\n  fmtCompact(n) {\n    if (n >= 1e6) { const m = n / 1e6; return (m >= 10 ? Math.round(m) : m.toFixed(1)) + 'M'; }\n    if (n >= 1e3) { const k = n / 1e3; return (k >= 100 ? Math.round(k) : k.toFixed(1)) + 'K'; }\n    return String(Math.round(n));\n  }\n  // 12400 → \"12,400\" (thousands separators).\n  fmtInt(n) { return Math.round(n).toLocaleString('en-US'); }\n\n  // Qualitative band for the eco score. Four tiers keyed off the 0-100 score\n  // (read as a percentile): Very Poor → OK → Good → Excellent.\n  ecoBand(score) {\n    if (score < 40) return 'Very Poor';\n    if (score < 65) return 'OK';\n    if (score < 85) return 'Good';\n    return 'Excellent';\n  }\n\n  // Parse \"#rrggbb\" → [r, g, b].\n  hexToRgb(h) {\n    h = h.replace('#', '');\n    return [parseInt(h.slice(0, 2), 16), parseInt(h.slice(2, 4), 16), parseInt(h.slice(4, 6), 16)];\n  }\n\n  // Continuous colour ramp for the score: red (low) → amber → lime → dark-ish\n  // green (high). Returns [r, g, b] so callers can also lighten it for text.\n  ecoRgb(score) {\n    const stops = [[0, '#e24b3a'], [40, '#e8923a'], [70, '#7fc23f'], [100, '#1f9d52']];\n    let lo = stops[0], hi = stops[stops.length - 1];\n    for (let i = 0; i < stops.length - 1; i++) {\n      if (score >= stops[i][0] && score <= stops[i + 1][0]) { lo = stops[i]; hi = stops[i + 1]; break; }\n    }\n    const t = hi[0] === lo[0] ? 0 : (score - lo[0]) / (hi[0] - lo[0]);\n    const a = this.hexToRgb(lo[1]), b = this.hexToRgb(hi[1]);\n    return a.map((c, i) => Math.round(c + (b[i] - c) * t));\n  }\n\n  // Build the wavy water-surface path for the liquid gauge. Surface sits at y\n  // `level`, waves with amplitude `amp`. Drawn twice as wide as the circle\n  // (0→344) so the CSS aqWave animation can scroll it left by one tile (172)\n  // seamlessly. Uses Q+T so each crest/trough mirrors the last — a sine shape.\n  ecoWave(level, amp) {\n    const W = 172, H = 172, q = W / 4;\n    return `M0,${level.toFixed(1)} `\n      + `Q${q},${(level - amp).toFixed(1)} ${W / 2},${level.toFixed(1)} `\n      + `T${W},${level.toFixed(1)} T${W * 1.5},${level.toFixed(1)} T${2 * W},${level.toFixed(1)} `\n      + `L${2 * W},${H} L0,${H} Z`;\n  }\n\n  renderVals() {\n    const p = this.props;\n\n    // ════════ 1. READ PROPS (with safe fallbacks — `default` only seeds the\n    //             Tweaks editor, so we must still default at runtime). ════════\n    const gallons       = p.gallonsSaved         ?? 12400;  // total water reclaimed (US gal)\n    const weeklyGain    = p.weeklyGainGallons     ?? 320;    // gal added this week\n    const people        = p.peopleServed          ?? 47;     // people-years of drinking water\n    const ecoScore      = Math.max(0, Math.min(100, p.ecoScore ?? 87)); // clamp 0-100\n    const ecoDelta      = p.ecoScoreWeeklyDelta   ?? 4;      // points gained this week\n    const ecoPercentile = p.ecoPercentile         ?? 9;      // \"top N% of homes\"\n    const money         = p.moneySavedYear         ?? 248;   // $ saved this year\n    const reductionPct  = p.usageReductionPct      ?? 18;    // % usage drop vs last quarter\n    const whPerGallon   = p.energyPerGallonWh      ?? 150;   // Wh of electricity to pump, treat & heat one saved gallon\n    const whLow         = p.elecPerQueryLow        ?? 3;     // Wh of data-center electricity per query (low end)\n    const whHigh        = p.elecPerQueryHigh       ?? 10;    // Wh per query (high end)\n    const actual        = p.monthlySavedGallons     ?? [3100, 4200, 5600, 7000, 9400, 12400];\n    const projected     = p.projectedSavedGallons   ?? [2200, 3000, 3900, 4800, 5700, 6600];\n    const months        = p.monthLabels             ?? ['JAN', 'FEB', 'MAR', 'APR', 'MAY', 'JUN'];\n\n    // ════════ 2. CLAUDE ELECTRICITY COMPARISON (the feature math) ════════\n    // Saving tap water also saves the electricity used to pump, treat and heat\n    // it (whPerGallon). Convert the saved gallons → watt-hours, then divide by\n    // a Claude query's data-center electricity cost to express it as \"queries\".\n    const whTotal  = gallons * whPerGallon;        // total Wh of electricity saved\n    const kwhTotal = whTotal / 1000;                // same, in kWh (for display)\n    const whAvg    = (whLow + whHigh) / 2;          // average Wh per query (e.g. 6.5)\n\n    // Fewer Wh per query ⇒ MORE queries. So:\n    //   high Wh (10) → the MINIMUM query count\n    //   low  Wh (3)  → the MAXIMUM query count\n    const queriesMin = whTotal / whHigh;           // conservative estimate\n    const queriesMax = whTotal / whLow;            // generous estimate\n    const queriesAvg = whTotal / whAvg;            // headline figure\n\n    // Where the average marker sits on the min→max track, as a 0-100% string.\n    const span      = queriesMax - queriesMin || 1; // guard divide-by-zero\n    const markerPct = ((queriesAvg - queriesMin) / span) * 100;\n\n    // ════════ 3. ECO-SCORE LIQUID GAUGE ════════\n    // The circle fills with \"water\" up to (ecoScore/100). We compute the surface\n    // level (y) and two scrolling sine-wave paths, plus a red→green colour ramp.\n    // Text uses a lightened tint of that colour so it stays legible.\n    const ecoY = (1 - ecoScore / 100) * 172;        // surface height (smaller y = fuller)\n    const ecoWaveFront = this.ecoWave(ecoY, 7);\n    const ecoWaveBack  = this.ecoWave(ecoY - 4, 5);\n    const [er, eg, eb] = this.ecoRgb(ecoScore);\n    const ecoColor     = `rgb(${er},${eg},${eb})`;\n    const ecoColorText = `rgb(${Math.round(er + (255 - er) * 0.35)},${Math.round(eg + (255 - eg) * 0.35)},${Math.round(eb + (255 - eb) * 0.35)})`;\n    const ecoGlow      = `rgba(${er},${eg},${eb},0.45)`;\n\n    // ════════ 4. SAVINGS-GRAPH GEOMETRY ════════\n    // The SVG viewBox is 1120×150. We plot points into a padded box and build\n    // path strings. Y is inverted (bigger value = higher = smaller y).\n    const X0 = 40, X1 = 1080;          // left / right plot bounds\n    const Y_TOP = 20, Y_BOTTOM = 130;  // top (max value) / baseline (zero)\n    const maxVal = Math.max(...actual, ...projected, 1); // shared scale\n    const n = actual.length;\n\n    const xAt = (i) => X0 + (X1 - X0) * (n > 1 ? i / (n - 1) : 0);\n    const yAt = (v) => Y_BOTTOM - (v / maxVal) * (Y_BOTTOM - Y_TOP);\n\n    // Build \"M x,y L x,y …\" for a series.\n    const toPath = (series) =>\n      series.map((v, i) => `${i ? 'L' : 'M'}${xAt(i).toFixed(1)},${yAt(v).toFixed(1)}`).join(' ');\n\n    const graphActualPath    = toPath(actual);\n    const graphProjectedPath = toPath(projected);\n    // Area = actual line, then drop to baseline and close back to the start.\n    const graphAreaPath = `${graphActualPath} L${xAt(n - 1).toFixed(1)},150 L${X0},150 Z`;\n\n    // A <circle> per actual point EXCEPT the last (the last gets the pulsing\n    // dot rendered in the template). React renders these inside the <svg>, so\n    // they correctly inherit the SVG namespace.\n    const graphDots = actual.slice(0, -1).map((v, i) =>\n      React.createElement('circle', { key: i, cx: xAt(i), cy: yAt(v), r: 4, fill: '#7af0e6' })\n    );\n    const graphLastX = xAt(n - 1);\n    const graphLastY = yAt(actual[n - 1]);\n\n    // Projection gap: the band between ACTUAL (top) and PROJECTED (bottom), and\n    // how many gallons we beat the projection by at the latest month. The band\n    // path runs forward along actual, then back along projected, and closes.\n    const graphGapAreaPath = `${toPath(actual)} `\n      + projected.map((v, i) => `L${xAt(n - 1 - i).toFixed(1)},${yAt(projected[n - 1 - i]).toFixed(1)}`).join(' ')\n      + ' Z';\n    const gapGallons   = actual[n - 1] - projected[n - 1];\n    const yProjLast    = yAt(projected[n - 1]);\n    const graphGapTop  = `${(((graphLastY + yProjLast) / 2) / 150 * 100).toFixed(1)}%`; // vertical centre of the gap, as % of plot height\n    const graphGapLabel = `+${this.fmtInt(gapGallons)} gal vs. projection`;\n\n    // ════════ 5. RETURN every value the template's {{ holes }} need ════════\n    return {\n      // hero\n      gallonsLabel:    this.fmtInt(gallons),\n      weeklyGainLabel: `▲ ${this.fmtInt(weeklyGain)} this week`,\n      peopleServed:    people,\n\n      // eco score (liquid gauge — water fills to the score; colour red→green)\n      ecoScore:        ecoScore,\n      ecoQualityLabel: this.ecoBand(ecoScore),\n      ecoPercentile:   ecoPercentile,\n      ecoDeltaLabel:   `▲ ${ecoDelta} pts this week`,\n      ecoColor:        ecoColor,\n      ecoColorText:    ecoColorText,\n      ecoGlow:         ecoGlow,\n      ecoWaveFront:    ecoWaveFront,\n      ecoWaveBack:     ecoWaveBack,\n\n      // claude comparison (electricity)\n      queriesAvgLabel:  this.fmtCompact(queriesAvg),   // e.g. \"286K\"\n      queriesMinLabel:  this.fmtCompact(queriesMin),   // at high Wh\n      queriesMaxLabel:  this.fmtCompact(queriesMax),   // at low  Wh\n      elecPerQueryLow:  whLow,\n      elecPerQueryHigh: whHigh,\n      whRangeLabel:     `${whLow}–${whHigh}`,\n      whAvgLabel:       Number.isInteger(whAvg) ? String(whAvg) : whAvg.toFixed(1),\n      energyTotalLabel: `${this.fmtInt(kwhTotal)} kWh`,\n      markerLeftPct:    `${Math.max(0, Math.min(100, markerPct)).toFixed(0)}%`,\n\n      // money\n      moneyLabel:        `$${this.fmtInt(money)}`,\n      moneyMonthlyLabel: `≈ $${this.fmtInt(money / 12)} / month`,\n\n      // usage reduction (− sign baked in)\n      reductionLabel: `−${reductionPct}%`,\n\n      // savings graph\n      graphTitle:         `Water saved · last ${n} months`,\n      graphActualPath:    graphActualPath,\n      graphProjectedPath: graphProjectedPath,\n      graphAreaPath:      graphAreaPath,\n      graphDots:          graphDots,\n      graphLastX:         graphLastX,\n      graphLastY:         graphLastY,\n      graphEndLabel:      `${this.fmtInt(actual[n - 1])} gal`,\n      graphGapAreaPath:   graphGapAreaPath,\n      graphGapTop:        graphGapTop,\n      graphGapLabel:      graphGapLabel,\n      monthTicks:         months,\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
